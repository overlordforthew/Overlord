services:
  overlord:
    build: .
    container_name: overlord
    restart: unless-stopped
    init: true
    mem_limit: 4g
    memswap_limit: 5g
    depends_on:
      overlord-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    volumes:
      - ./auth:/app/auth
      - ./data:/app/data
      - ./logs:/app/logs
      - ./media:/app/media
      # Claude CLI — credentials (read-write so CLI can auto-refresh OAuth tokens)
      - /root/.claude/.credentials.json:/root/.claude/.credentials.json
      - /root/.claude/settings.json:/root/.claude/settings.json:ro
      - /root/.claude/settings.local.json:/root/.claude/settings.local.json:ro
      # Claude CLI — runtime dirs (read-write, needed for operation)
      - /root/.claude/debug:/root/.claude/debug
      - /root/.claude/todos:/root/.claude/todos
      - /root/.claude/projects:/root/.claude/projects
      - /root/.claude/cache:/root/.claude/cache
      - /root/.claude/session-env:/root/.claude/session-env
      # Git credentials for push access (staged to tmp, copied at startup)
      - /root/.gitconfig:/tmp/.gitconfig-host:ro
      - /root/.git-credentials:/tmp/.git-credentials-host:ro
      # Codex CLI — auth and config
      - /root/.codex:/root/.codex
      # Docker socket — allows container management from inside
      - /var/run/docker.sock:/var/run/docker.sock
      # Host tools (yt CLI, etc.) + YouTube OAuth tokens
      - /root/tools:/tools:ro
      - /root/.config/yt:/root/.config/yt
      # Project directories — mount root (has .git for Claude sandbox) + Overlord override
      - /root/projects:/projects
      - /root/overlord:/projects/Overlord
    networks:
      - coolify

  lightpanda:
    image: lightpanda/browser:nightly
    container_name: lightpanda
    restart: unless-stopped
    entrypoint: ["/usr/bin/lightpanda"]
    command: ["serve", "--host", "0.0.0.0", "--port", "9222"]
    ports:
      - "127.0.0.1:9222:9222"
    environment:
      LIGHTPANDA_DISABLE_TELEMETRY: "true"
    networks:
      - coolify

  overlord-db:
    image: postgres:17-alpine
    container_name: overlord-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: overlord
      POSTGRES_USER: overlord
      POSTGRES_PASSWORD: ${CONV_DB_PASS}
    volumes:
      - overlord_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overlord"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify

volumes:
  overlord_pgdata:

networks:
  coolify:
    external: true

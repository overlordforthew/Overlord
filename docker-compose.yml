services:
  overlord:
    build: .
    container_name: overlord
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 3g
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    volumes:
      - ./auth:/app/auth
      - ./data:/app/data
      - ./logs:/app/logs
      - ./media:/app/media
      # Claude CLI — credentials (read-write so CLI can auto-refresh OAuth tokens)
      - /root/.claude/.credentials.json:/root/.claude/.credentials.json
      - /root/.claude/settings.json:/root/.claude/settings.json:ro
      - /root/.claude/settings.local.json:/root/.claude/settings.local.json:ro
      # Claude CLI — runtime dirs (read-write, needed for operation)
      - /root/.claude/debug:/root/.claude/debug
      - /root/.claude/todos:/root/.claude/todos
      - /root/.claude/projects:/root/.claude/projects
      - /root/.claude/cache:/root/.claude/cache
      - /root/.claude/session-env:/root/.claude/session-env
      # Git credentials for push access (staged to tmp, copied at startup)
      - /root/.gitconfig:/tmp/.gitconfig-host:ro
      - /root/.git-credentials:/tmp/.git-credentials-host:ro
      # Codex CLI — auth and config
      - /root/.codex:/root/.codex
      # Docker socket — allows container management from inside
      - /var/run/docker.sock:/var/run/docker.sock
      # Project directories — mount root (has .git for Claude sandbox) + Overlord override
      - /root/projects:/projects
      - /root/overlord:/projects/Overlord
    networks:
      - coolify

networks:
  coolify:
    external: true

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"   # REST API
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - ./storage:/qdrant/storage
      - ./config:/qdrant/config:ro
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    mem_limit: 512m
    networks:
      - coolify

networks:
  coolify:
    external: true

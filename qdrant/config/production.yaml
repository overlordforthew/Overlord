log_level: INFO

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334

storage:
  # Default quantization config applied when not specified at collection level
  # Enables scalar quantization for RAM efficiency
  quantization:
    scalar:
      type: int8
      quantile: 0.99
      always_ram: true

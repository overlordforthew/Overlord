# Fail2ban filter for Traefik — bots scanning for exploitable paths
# Catches scanners probing for wp-admin, .env, phpMyAdmin, etc.

[Definition]

failregex = ^<HOST> \- \S+ \[\] \"(?:GET|POST|HEAD) (?:/(?:wp-admin|wp-login|wp-content|wp-includes|xmlrpc|\.env|\.git|phpMyAdmin|phpmyadmin|pma|admin|actuator|cgi-bin|shell|boaform|setup\.cgi|config|\.aws|\.well-known/security\.txt|telescope|vendor|debug|console|manager|solr|api/v1/pods|\.DS_Store|backup|db|dump|sql))\b[^\"]*\" \d+\b

ignoreregex =

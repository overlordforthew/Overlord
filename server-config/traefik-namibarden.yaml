http:
  routers:
    https-coolify-sentinel-api:
      entryPoints:
      - https
      rule: Host(`coolify.namibarden.com`) && PathPrefix(`/api/v1/sentinel`)
      service: coolify-app
      tls:
        certResolver: letsencrypt
      priority: 100
    https-coolify-webhooks:
      entryPoints:
      - https
      rule: Host(`coolify.namibarden.com`) && PathPrefix(`/webhooks/`)
      service: coolify-app
      tls:
        certResolver: letsencrypt
      priority: 50
    http-coolify:
      entryPoints:
      - http
      rule: Host(`coolify.namibarden.com`)
      middlewares:
      - redirect-to-https-file
      service: coolify-app
    https-coolify:
      entryPoints:
      - https
      rule: Host(`coolify.namibarden.com`)
      middlewares:
      - tailscale-only
      service: coolify-app
      tls:
        certResolver: letsencrypt
    http-surfababe:
      entryPoints:
      - http
      rule: Host(`surfababe.namibarden.com`)
      middlewares:
      - redirect-to-https-file
      service: surfababe
    https-surfababe:
      entryPoints:
      - https
      rule: Host(`surfababe.namibarden.com`)
      middlewares:
      - security-headers
      service: surfababe
      tls:
        certResolver: letsencrypt
    http-mastercommander:
      entryPoints:
      - http
      rule: Host(`mastercommander.namibarden.com`)
      middlewares:
      - redirect-to-https-file
      service: mastercommander
    https-mastercommander:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`)
      middlewares:
      - security-headers
      service: mastercommander
      tls:
        certResolver: letsencrypt
    https-mastercommander-gate:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/gate`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    https-mastercommander-chat:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/web-chat`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    https-mastercommander-auth:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/auth`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    https-mastercommander-boats:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/boats`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    https-mastercommander-user:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/user`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    https-mastercommander-billing:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/billing`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    https-mastercommander-stripe:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/stripe`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    https-mastercommander-contact:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && Path(`/api/contact`)
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100
    http-onlyhulls:
      entryPoints:
      - http
      rule: Host(`onlyhulls.com`) || Host(`www.onlyhulls.com`)
      middlewares:
      - redirect-to-https-file
      service: onlyhulls
    https-onlyhulls:
      entryPoints:
      - https
      rule: Host(`onlyhulls.com`)
      middlewares:
      - security-headers
      service: onlyhulls
      tls:
        certResolver: letsencrypt
    https-onlyhulls-www:
      entryPoints:
      - https
      rule: Host(`www.onlyhulls.com`)
      middlewares:
      - redirect-to-non-www
      service: onlyhulls
      tls:
        certResolver: letsencrypt
    http-hl-dashboard:
      entryPoints:
      - http
      rule: Host(`hl.namibarden.com`)
      middlewares:
      - redirect-to-https-file
      service: hl-dashboard
    https-hl-dashboard:
      entryPoints:
      - https
      rule: Host(`hl.namibarden.com`)
      middlewares:
      - security-headers
      service: hl-dashboard
      tls:
        certResolver: letsencrypt
    https-surfababe-deploy:
      entryPoints:
      - https
      rule: Host(`surfababe.namibarden.com`) && Path(`/webhook/deploy`)
      service: surfababe-deploy
      tls:
        certResolver: letsencrypt
    http-overlord-web:
      entryPoints:
      - http
      rule: Host(`overlord.namibarden.com`)
      middlewares:
      - redirect-to-https-file
      service: overlord-web
    https-overlord-web:
      entryPoints:
      - https
      rule: Host(`overlord.namibarden.com`)
      middlewares:
      - security-headers
      service: overlord-web
      tls:
        certResolver: letsencrypt
    raw-ip-catchall:
      entryPoints:
      - https
      rule: Host(`89.167.12.82`)
      service: noop-ip
      tls: {}
      priority: -500
    https-mastercommander-user-generate-token:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && Path(`/api/user/generate-token`)
      service: mastercommander
      tls:
        certResolver: letsencrypt
      priority: 200
    https-mastercommander-user-ai-key:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/user/ai-key`)
      service: mastercommander
      tls:
        certResolver: letsencrypt
      priority: 200
    https-mastercommander-billing-mc:
      entryPoints:
      - https
      rule: Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/billing`)
      service: mastercommander
      tls:
        certResolver: letsencrypt
      priority: 200
  middlewares:
    redirect-to-https-file:
      redirectScheme:
        scheme: https
        permanent: true
    redirect-to-non-www:
      redirectRegex:
        regex: ^https?://www\.(.+)
        replacement: https://${1}
        permanent: true
    strip-server:
      headers:
        customResponseHeaders:
          Server: ''
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        customResponseHeaders:
          X-Permitted-Cross-Domain-Policies: none
          Permissions-Policy: camera=(), microphone=(), geolocation=(), payment=()
    tailscale-only:
      ipAllowList:
        sourceRange:
        - 100.64.0.0/10
  services:
    coolify-app:
      loadBalancer:
        servers:
        - url: http://coolify:8080
    surfababe:
      loadBalancer:
        servers:
        - url: http://surfababe:3002
    surfababe-deploy:
      loadBalancer:
        servers:
        - url: http://host.docker.internal:9002
    mastercommander:
      loadBalancer:
        servers:
        - url: http://mastercommander:80
    onlyhulls:
      loadBalancer:
        servers:
        - url: http://onlyhulls-app:80
    hl-dashboard:
      loadBalancer:
        servers:
        - url: http://hl-dashboard:5555
    overlord-api:
      loadBalancer:
        servers:
        - url: http://overlord:3001
    overlord-web:
      loadBalancer:
        servers:
        - url: http://host.docker.internal:3003
    noop-ip:
      loadBalancer:
        servers: {}

http:
  routers:
    # === namibarden.com — handled by Coolify Docker labels (auto-discovers new containers) ===
    # Removed file-based routes to prevent 502s after deploys.
    # See docker-compose.yaml labels in /data/coolify/applications/ock0wowgsgwwww8w00400k00/

    # === OpenClaw — REMOVED (service deleted, container gone) ===

    # === Coolify Sentinel API (token-authenticated, no Tailscale needed) ===
    https-coolify-sentinel-api:
      entryPoints:
        - https
      rule: "Host(`coolify.namibarden.com`) && PathPrefix(`/api/v1/sentinel`)"
      service: coolify-app
      tls:
        certResolver: letsencrypt
      priority: 100

    # === Coolify webhooks (public — GitHub needs to reach these) ===
    https-coolify-webhooks:
      entryPoints:
        - https
      rule: "Host(`coolify.namibarden.com`) && PathPrefix(`/webhooks/`)"
      service: coolify-app
      tls:
        certResolver: letsencrypt
      priority: 50

    # === Coolify dashboard (Tailscale only) ===
    http-coolify:
      entryPoints:
        - http
      rule: "Host(`coolify.namibarden.com`)"
      middlewares:
        - redirect-to-https-file
      service: coolify-app

    https-coolify:
      entryPoints:
        - https
      rule: "Host(`coolify.namibarden.com`)"
      middlewares:
        - tailscale-only
      service: coolify-app
      tls:
        certResolver: letsencrypt

    # Coolify WebSocket & Terminal routers removed — handled by coolify.yaml

    # === SurfaBabe (SurfAgent WhatsApp bot) ===
    http-surfababe:
      entryPoints:
        - http
      rule: "Host(`surfababe.namibarden.com`)"
      middlewares:
        - redirect-to-https-file
      service: surfababe

    https-surfababe:
      entryPoints:
        - https
      rule: "Host(`surfababe.namibarden.com`)"
      middlewares:
        - security-headers
      service: surfababe
      tls:
        certResolver: letsencrypt

    # === MasterCommander ===
    http-mastercommander:
      entryPoints:
        - http
      rule: "Host(`mastercommander.namibarden.com`)"
      middlewares:
        - redirect-to-https-file
      service: mastercommander

    https-mastercommander:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`)"
      middlewares:
        - security-headers
      service: mastercommander
      tls:
        certResolver: letsencrypt

    # MasterCommander gate API → Overlord container
    https-mastercommander-gate:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/gate`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # MasterCommander chat API → Overlord container
    https-mastercommander-chat:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/web-chat`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # MasterCommander auth API → Overlord container
    https-mastercommander-auth:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/auth`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # MasterCommander boats API → Overlord container
    https-mastercommander-boats:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/boats`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # MasterCommander user API → Overlord container
    https-mastercommander-user:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/user`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # MasterCommander billing API → Overlord container
    https-mastercommander-billing:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/billing`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # MasterCommander Stripe webhook → Overlord container
    https-mastercommander-stripe:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && PathPrefix(`/api/stripe`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # MasterCommander contact API → Overlord container
    https-mastercommander-contact:
      entryPoints:
        - https
      rule: "Host(`mastercommander.namibarden.com`) && Path(`/api/contact`)"
      service: overlord-api
      tls:
        certResolver: letsencrypt
      priority: 100

    # === OnlyHulls (onlyhulls.com) ===
    http-onlyhulls:
      entryPoints:
        - http
      rule: "Host(`onlyhulls.com`) || Host(`www.onlyhulls.com`)"
      middlewares:
        - redirect-to-https-file
      service: onlyhulls

    https-onlyhulls:
      entryPoints:
        - https
      rule: "Host(`onlyhulls.com`)"
      middlewares:
        - security-headers
      service: onlyhulls
      tls:
        certResolver: letsencrypt

    https-onlyhulls-www:
      entryPoints:
        - https
      rule: "Host(`www.onlyhulls.com`)"
      middlewares:
        - redirect-to-non-www
      service: onlyhulls
      tls:
        certResolver: letsencrypt

    # === Hyperliquid Dashboard (Cloudflare-proxied, app-layer API key auth) ===
    http-hl-dashboard:
      entryPoints:
        - http
      rule: "Host(`hl.namibarden.com`)"
      middlewares:
        - redirect-to-https-file
      service: hl-dashboard

    https-hl-dashboard:
      entryPoints:
        - https
      rule: "Host(`hl.namibarden.com`)"
      middlewares:
        - security-headers
      service: hl-dashboard
      tls:
        certResolver: letsencrypt

    # SurfaBabe deploy webhook (path on surfababe subdomain)
    https-surfababe-deploy:
      entryPoints:
        - https
      rule: "Host(`surfababe.namibarden.com`) && Path(`/webhook/deploy`)"
      service: surfababe-deploy
      tls:
        certResolver: letsencrypt

    # === Overlord Web Terminal ===
    http-overlord-web:
      entryPoints:
        - http
      rule: "Host(`overlord.namibarden.com`)"
      middlewares:
        - redirect-to-https-file
      service: overlord-web

    https-overlord-web:
      entryPoints:
        - https
      rule: "Host(`overlord.namibarden.com`)"
      middlewares:
        - security-headers
      service: overlord-web
      tls:
        certResolver: letsencrypt

    # === Raw IP catchall — prevents ACME errors from bot/scanner traffic ===
    raw-ip-catchall:
      entryPoints:
        - https
      rule: "Host(`89.167.12.82`)"
      service: noop-ip
      tls: {}
      priority: -500

  middlewares:
    redirect-to-https-file:
      redirectScheme:
        scheme: https
        permanent: true

    redirect-to-non-www:
      redirectRegex:
        regex: "^https?://www\\.(.+)"
        replacement: "https://${1}"
        permanent: true

    strip-server:
      headers:
        customResponseHeaders:
          Server: ""

    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Permitted-Cross-Domain-Policies: "none"
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=()"

    # Strict Tailscale-only: requires DNS-only (grey cloud) in Cloudflare
    # for coolify.namibarden.com (wildcard DNS resolves direct, not via Cloudflare).
    # If these subdomains are Cloudflare-proxied (orange cloud), requests
    # arrive from Cloudflare IPs and will be BLOCKED — switch to DNS-only.
    tailscale-only:
      ipAllowList:
        sourceRange:
          - "100.64.0.0/10"

  services:
    # openclaw service removed — container deleted

    coolify-app:
      loadBalancer:
        servers:
          - url: "http://coolify:8080"

    # coolify-realtime and coolify-terminal services removed —
    # already defined in Coolify's auto-generated coolify.yaml.
    # Duplicates caused Traefik v3 to reject ALL file-provider services.

    surfababe:
      loadBalancer:
        servers:
          - url: "http://surfababe:3002"

    surfababe-deploy:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9002"

    mastercommander:
      loadBalancer:
        servers:
          - url: "http://mastercommander:80"

    onlyhulls:
      loadBalancer:
        servers:
          - url: "http://onlyhulls-app:80"

    hl-dashboard:
      loadBalancer:
        servers:
          - url: "http://hl-dashboard:5555"

    overlord-api:
      loadBalancer:
        servers:
          - url: "http://overlord:3001"

    overlord-web:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3003"

    noop-ip:
      loadBalancer:
        servers: {}

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./data:/beszel_data
    networks:
      - coolify
    mem_limit: 128m

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: 45876
      # KEY is set in .env — copy from Beszel hub UI when adding this system
      KEY: "${BESZEL_AGENT_KEY}"

networks:
  coolify:
    external: true
